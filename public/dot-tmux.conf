# Remap prefix to Ctrl-a (optional but common)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind C-space send-prefix


# Sane splits: | and - instead of % and "
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Vim-style window navigation
bind H select-window -t :-
bind L select-window -t :+
bind [ select-window -t :-
bind ] select-window -t :+

# Mouse support (lets you click panes, resize with drag)
set -g mouse on
# Scroll up through output with mouse wheel
bind -n WheelUpPane if-shell -F -t = "#{pane_in_mode}" "send-keys -M" "if-shell -F -t = '#{mouse_any_flag}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane if-shell -F -t = "#{pane_in_mode}" "send-keys -M" "if-shell -F -t = '#{mouse_any_flag}' 'send-keys -M' 'copy-mode -e'"

# Start windows and panes at 1, not 0 (ergonomic—closer to prefix key)
set -g base-index 1
setw -g pane-base-index 1

# Increase scrollback buffer
set -g history-limit 10000

# Reload config without restart
bind r source-file ~/.tmux.conf \; display "Reloaded"

setw -g mode-keys vi
